<!DOCTYPE html>
<html lang=en>
<head>
<title>Statistics Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
<h1>Statistics Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [
{q:"What is the average of a data set called?", a:["Median","Mean","Mode"], c:1},
  {q:"What is the middle value of a data set called?", a:["Mean","Median","Range"], c:1},
  {q:"What is the most frequent value called?", a:["Mode","Mean","Variance"], c:0},
  {q:"What is range?", a:["Highest - Lowest","Sum of values","Middle value"], c:0},
  {q:"What is an outlier?", a:["Common value","Extreme value","Average value"], c:1},

  {q:"What does probability measure?", a:["Chance of an event","Average value","Spread of data"], c:0},
  {q:"Probability is always between?", a:["0 and 1","1 and 100","-1 and 1"], c:0},
  {q:"A probability of 0 means?", a:["Certain","Impossible","Likely"], c:1},
  {q:"A probability of 1 means?", a:["Impossible","Certain","Unlikely"], c:1},
  {q:"What is a population?", a:["Entire group","Small sample","Average"], c:0},

  {q:"What is a sample?", a:["Entire population","Subset of population","Middle value"], c:1},
  {q:"What is bias in sampling?", a:["Fair selection","Unfair selection","Random error"], c:1},
  {q:"What is a histogram used for?", a:["Categorical data","Numerical distribution","Scatterplots"], c:1},
  {q:"What does a bar graph show?", a:["Categories","Continuous distribution","Correlation"], c:0},
  {q:"What does a scatterplot show?", a:["Category counts","Relationship between variables","Middle value"], c:1},

  {q:"What does correlation measure?", a:["Spread","Relationship strength","Average"], c:1},
  {q:"Positive correlation means?", a:["Variables increase together","One rises, one falls","No pattern"], c:0}
  
];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
