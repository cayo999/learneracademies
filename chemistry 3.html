<!DOCTYPE html>
<html lang=en>
<head>
    <title>Chemistry Quiz | Learner Academies</title>
    <link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png"></head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
<h1>Chemistry Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [
{q:"What happens in reduction?", a:["Lose electrons","Gain electrons","Split atoms"], c:1},
  {q:"What is the symbol for potassium?", a:["Po","Pt","K"], c:2},

  {q:"What is the symbol for silver?", a:["Si","Ag","Sv"], c:1},
  {q:"What gas do plants absorb?", a:["Oxygen","Carbon dioxide","Nitrogen"], c:1},
  {q:"What gas do humans exhale most?", a:["Carbon dioxide","Oxygen","Nitrogen"], c:0},
  {q:"What is the formula for methane?", a:["CH₄","C₂H₆","CO₂"], c:0},
  {q:"What is the lightest element?", a:["Helium","Hydrogen","Lithium"], c:1},

  {q:"What is the symbol for lead?", a:["Pb","Ld","Le"], c:0},
  {q:"What is the boiling point of water in Celsius?", a:["0°C","50°C","100°C"], c:2},
  {q:"What is the freezing point of water in Celsius?", a:["0°C","32°C","100°C"], c:0},
  {q:"What is a catalyst?", a:["Speeds reaction","Stops reaction","Adds mass"], c:0},
  {q:"What is conservation of mass?", a:["Mass is created","Mass is destroyed","Mass stays constant"], c:2},

  {q:"What is the formula for ammonia?", a:["NH₃","NO₂","NaOH"], c:0},
  {q:"What element is needed for combustion?", a:["Nitrogen","Oxygen","Helium"], c:1},
  {q:"What is plasma?", a:["Charged gas","Liquid metal","Frozen gas"], c:0},
  {q:"What is the symbol for chlorine?", a:["Cl","Ch","Cr"], c:0},
  {q:"What is the center of an atom called?", a:["Nucleus","Shell","Cloud"], c:0}
];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
