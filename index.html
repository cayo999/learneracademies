<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quiz Launcher | Learner Academies</title>
        <link rel="shortcut icon" href="favicon.png" />
    </head>
    <body>
        <a href="index.html" class="favicon-link">
            <img src="favicon.png" alt="Launcher" />
        </a>
        <div class="container">
            <h1>Quiz Launcher</h1>

            <div class="grid">
                <button class="launch-btn" onclick="launch('trigonometry 1.html')">Trigonometry Quiz 1</button>

                <button class="launch-btn" onclick="launch('trigonometry 2.html')">Trigonometry Quiz 2</button>

                <button class="launch-btn" onclick="launch('trigonometry 3.html')">Trigonometry Quiz 3</button>

                <button class="launch-btn" onclick="launch('algebra 1.html')">Algebra Quiz 1</button>

                <button class="launch-btn" onclick="launch('algebra 2.html')">Algebra Quiz 2</button>

                <button class="launch-btn" onclick="launch('algebra 3.html')">Algebra Quiz 3</button>

                <button class="launch-btn" onclick="launch('statistics 1.html')">Statistics Quiz 1</button>

                <button class="launch-btn" onclick="launch('statistics 2.html')">Statistics Quiz 2</button>

                <button class="launch-btn" onclick="launch('statistics 3.html')">Statistics Quiz 3</button>

                <button class="launch-btn" onclick="launch('physics 1.html')">Physics Quiz 1</button>

                <button class="launch-btn" onclick="launch('physics 2.html')">Physics Quiz 2</button>

                <button class="launch-btn" onclick="launch('physics 3.html')">Physics Quiz 3</button>

                <button class="launch-btn" onclick="launch('chemistry 1.html')">Chemistry Quiz 1</button>

                <button class="launch-btn" onclick="launch('chemistry 2.html')">Chemistry Quiz 2</button>

                <button class="launch-btn" onclick="launch('chemistry 3.html')">Chemistry Quiz 3</button>

                <button class="launch-btn" onclick="launch('geometry 1.html')">Geometry Quiz 1</button>

                <button class="launch-btn" onclick="launch('geometry 2.html')">Geometry Quiz 2</button>

                <button class="launch-btn" onclick="launch('geometry 3.html')">Geometry Quiz 3</button>

                <button class="launch-btn" onclick="launch('calculus 1.html')">Calculus Quiz 1</button>

                <button class="launch-btn" onclick="launch('calculus 2.html')">Calculus Quiz 2</button>

                <button class="launch-btn" onclick="launch('calculus 3.html')">Calculus Quiz 3</button>
            </div>
        </div>

        <script>
            function launch(page) {
                window.location.href = page;
            }
        </script>
    </body>
</html>
