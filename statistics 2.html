<!DOCTYPE html>
<html lang=en>
<head>
<title>Statistics Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
<h1>Statistics Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [

  {q:"Negative correlation means?", a:["Both rise","One rises as other falls","No relationship"], c:1},
  {q:"No correlation means?", a:["Strong pattern","No clear relationship","Opposite movement"], c:1},
  {q:"What is standard deviation?", a:["Spread of data","Average value","Probability"], c:0},

  {q:"A small standard deviation means?", a:["Data spread out","Data close to mean","No average"], c:1},
  {q:"What is variance?", a:["Square of standard deviation","Middle value","Difference of max/min"], c:0},
  {q:"What is a random sample?", a:["Every member equal chance","Biased sample","Small sample"], c:0},
  {q:"What is experimental probability?", a:["Based on outcomes observed","Theoretical only","Always exact"], c:0},
  {q:"What is theoretical probability?", a:["Observed outcomes","Expected outcomes","Middle value"], c:1},

  {q:"Formula for probability?", a:["Favorable/Total","Total/Favorable","Mean/Range"], c:0},
  {q:"What is a percentile?", a:["Position relative to others","Average value","Range"], c:0},
  {q:"What does 50th percentile represent?", a:["Median","Mean","Mode"], c:0},
  {q:"What is quartile?", a:["Divide into 4 parts","Divide into 2 parts","Average"], c:0},
  {q:"What is the interquartile range?", a:["Q3 - Q1","Q1 - Q3","Mean - Median"], c:0},

  {q:"What does a boxplot display?", a:["Data spread summary","Scatter relationship","Exact probabilities"], c:0},
  {q:"What is skewness?", a:["Symmetry of distribution","Average","Middle value"], c:0},
  {q:"Right skew means?", a:["Tail extends right","Tail extends left","Perfect symmetry"], c:0}
  

];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
