<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Algebra Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
<style>
    /* === GLOBAL THEME === */
body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(to bottom right, #111827, #0f172a, #111827);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
}

/* === MAIN CONTAINER === */
.container {
    width: 100%;
    max-width: 700px;
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 1rem;
    padding: 2rem;
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
}

/* === HEADINGS === */
h1 {
    text-align: center;
    margin-bottom: 1.5rem;
}

/* === BUTTONS === */
button {
    width: 100%;
    margin: 0.5rem 0;
    padding: 0.75rem;
    border: none;
    border-radius: 0.5rem;
    background: linear-gradient(to right, #2563eb, #22c55e);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    background: linear-gradient(to right, #3b82f6, #4ade80);
}

/* === ANSWER ANIMATIONS === */
.correct {
    animation: correctFlash 0.4s ease;
    background: linear-gradient(to right, #22c55e, #16a34a) !important;
}

.wrong {
    animation: wrongShake 0.4s ease;
    background: linear-gradient(to right, #ef4444, #b91c1c) !important;
}

@keyframes correctFlash {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

@keyframes wrongShake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

/* === FADE ANIMATION === */
.fade {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* === RESULTS SCREEN === */
#resultScreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.resultBox {
    background: #1f2937;
    padding: 2rem;
    border-radius: 1rem;
    text-align: center;
    border: 1px solid #374151;
    width: 90%;
    max-width: 400px;
}
/* === ANSWER ANIMATIONS === */
.correct {
    animation: correctFlash 0.4s ease;
    background: linear-gradient(to right, #22c55e, #16a34a) !important;
}

.wrong {
    animation: wrongShake 0.4s ease;
    background: linear-gradient(to right, #ef4444, #b91c1c) !important;
}

@keyframes correctFlash {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

@keyframes wrongShake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

/* === FADE BETWEEN QUESTIONS === */
.fade {
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* === RESULTS OVERLAY === */
#resultScreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.resultBox {
    background: #1f2937;
    padding: 2rem;
    border-radius: 1rem;
    text-align: center;
    border: 1px solid #374151;
    width: 90%;
    max-width: 400px;
}

.resultBox h2 {
    margin-bottom: 1rem;
}

.resultBox button {
    margin-top: 1rem;
}
#progressWrapper {
    margin-bottom: 1.5rem;
}

#progressText {
    text-align: right;
    font-size: 0.9rem;
    margin-bottom: 0.3rem;
    opacity: 0.8;
}

#progressBar {
    width: 100%;
    height: 10px;
    background: #374151;
    border-radius: 999px;
    overflow: hidden;
}

#progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #2563eb, #22c55e);
    transition: width 0.3s ease;
}
.favicon-link {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
}

.favicon-link img {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    transition: transform 0.2s ease;
}

.favicon-link img:hover {
    transform: scale(1.15);
}
</style>
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<h1>Algebra Quiz</h1>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [
{q:"What is the solution to x + 5 = 12?", a:["5","7","17"], c:1},
  {q:"What is the value of x in 3x = 15?", a:["3","5","15"], c:1},
  {q:"What is the slope formula?", a:["(y₂-y₁)/(x₂-x₁)","x₂-x₁","y₂+y₁"], c:0},
  {q:"What is the y-intercept in y = 2x + 4?", a:["2","4","6"], c:1},
  {q:"Simplify: 4x + 3x", a:["7x","12x","x⁷"], c:0},

  {q:"Solve: x - 8 = 3", a:["11","5","-5"], c:0},
  {q:"What is 2²?", a:["2","4","8"], c:1},
  {q:"What is 3³?", a:["9","6","27"], c:2},
  {q:"Simplify: x² · x³", a:["x⁵","x⁶","x⁹"], c:0},
  {q:"Simplify: x⁶ ÷ x²", a:["x³","x⁴","x⁸"], c:1},

  {q:"What is the slope of a horizontal line?", a:["0","Undefined","1"], c:0},
  {q:"What is the slope of a vertical line?", a:["0","Undefined","∞"], c:1},
  {q:"Solve: 2x + 6 = 14", a:["3","4","5"], c:1},
  {q:"What is the distributive property of 3(x+2)?", a:["3x+2","3x+6","x+6"], c:1},
  {q:"Factor: x² + 5x", a:["x(x+5)","(x+5)²","x²(5)"], c:0},

  {q:"What is the standard form of a linear equation?", a:["Ax + By = C","y = mx+b","x²+y²=r²"], c:0},
  {q:"What does m represent in y=mx+b?", a:["Slope","Y-intercept","X-intercept"], c:0}
];

let i=0, score=0;
let userAnswers = [];
function load(){
    updateProgress();
 if(i>=questions.length){

 let review = `
 <h2>Score: ${score}/${questions.length}</h2>
 <h3>Review</h3>
 `;

 questions.forEach((q, index) => {

   const userChoice = userAnswers[index];
   const correctChoice = q.c;

   review += `
   <div style="margin-bottom:20px; text-align:left;">
     <strong>${index + 1}. ${q.q}</strong><br>
     Your Answer:
     <span style="color:${userChoice===correctChoice ? 'lime' : 'red'}">
       ${q.a[userChoice]}
     </span><br>
     Correct Answer:
     <span style="color:lime">
       ${q.a[correctChoice]}
     </span>
   </div>
   `;
 });

 document.getElementById("quiz").innerHTML = review;
 return;
}

 let q = questions[i];
 document.getElementById("quiz").innerHTML =
 `<h2>${q.q}</h2>` +
 q.a.map((ans,idx)=>
 `<button onclick="check(${idx})">${ans}</button>`).join("");
}

function check(idx){

 userAnswers.push(idx);

 if(idx===questions[i].c) score++;

 i++;
 load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
    function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
