<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Algebra Quiz | Learner Academies</title>
    <link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<h1>Algebra Quiz</h1>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [
{q:"What is the solution to x + 5 = 12?", a:["5","7","17"], c:1},
  {q:"What is the value of x in 3x = 15?", a:["3","5","15"], c:1},
  {q:"What is the slope formula?", a:["(y₂-y₁)/(x₂-x₁)","x₂-x₁","y₂+y₁"], c:0},
  {q:"What is the y-intercept in y = 2x + 4?", a:["2","4","6"], c:1},
  {q:"Simplify: 4x + 3x", a:["7x","12x","x⁷"], c:0},

  {q:"Solve: x - 8 = 3", a:["11","5","-5"], c:0},
  {q:"What is 2²?", a:["2","4","8"], c:1},
  {q:"What is 3³?", a:["9","6","27"], c:2},
  {q:"Simplify: x² · x³", a:["x⁵","x⁶","x⁹"], c:0},
  {q:"Simplify: x⁶ ÷ x²", a:["x³","x⁴","x⁸"], c:1},

  {q:"What is the slope of a horizontal line?", a:["0","Undefined","1"], c:0},
  {q:"What is the slope of a vertical line?", a:["0","Undefined","∞"], c:1},
  {q:"Solve: 2x + 6 = 14", a:["3","4","5"], c:1},
  {q:"What is the distributive property of 3(x+2)?", a:["3x+2","3x+6","x+6"], c:1},
  {q:"Factor: x² + 5x", a:["x(x+5)","(x+5)²","x²(5)"], c:0},

  {q:"What is the standard form of a linear equation?", a:["Ax + By = C","y = mx+b","x²+y²=r²"], c:0},
  {q:"What does m represent in y=mx+b?", a:["Slope","Y-intercept","X-intercept"], c:0}
];

let i=0, score=0;
let userAnswers = [];
function load(){
    updateProgress();
 if(i>=questions.length){

 let review = `
 <h2>Score: ${score}/${questions.length}</h2>
 <h3>Review</h3>
 `;

 questions.forEach((q, index) => {

   const userChoice = userAnswers[index];
   const correctChoice = q.c;

   review += `
   <div style="margin-bottom:20px; text-align:left;">
     <strong>${index + 1}. ${q.q}</strong><br>
     Your Answer:
     <span style="color:${userChoice===correctChoice ? 'lime' : 'red'}">
       ${q.a[userChoice]}
     </span><br>
     Correct Answer:
     <span style="color:lime">
       ${q.a[correctChoice]}
     </span>
   </div>
   `;
 });

 document.getElementById("quiz").innerHTML = review;
 return;
}

 let q = questions[i];
 document.getElementById("quiz").innerHTML =
 `<h2>${q.q}</h2>` +
 q.a.map((ans,idx)=>
 `<button onclick="check(${idx})">${ans}</button>`).join("");
}

function check(idx){

 userAnswers.push(idx);

 if(idx===questions[i].c) score++;

 i++;
 load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
    function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
