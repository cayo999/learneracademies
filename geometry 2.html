<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geometry Quiz | Learner Academies</title>
    <link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
    <style>
        /* === GLOBAL THEME === */
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(to bottom right, #111827, #0f172a, #111827);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        /* === MAIN CONTAINER === */
        .container {
            width: 100%;
            max-width: 700px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        
        /* === HEADINGS === */
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        /* === BUTTONS === */
        button {
            width: 100%;
            margin: 0.5rem 0;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: linear-gradient(to right, #2563eb, #22c55e);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(to right, #3b82f6, #4ade80);
        }
        
        /* === ANSWER ANIMATIONS === */
        .correct {
            animation: correctFlash 0.4s ease;
            background: linear-gradient(to right, #22c55e, #16a34a) !important;
        }
        
        .wrong {
            animation: wrongShake 0.4s ease;
            background: linear-gradient(to right, #ef4444, #b91c1c) !important;
        }
        
        @keyframes correctFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes wrongShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        
        /* === FADE ANIMATION === */
        .fade {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* === RESULTS SCREEN === */
        #resultScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .resultBox {
            background: #1f2937;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #374151;
            width: 90%;
            max-width: 400px;
        }
        /* === ANSWER ANIMATIONS === */
        .correct {
            animation: correctFlash 0.4s ease;
            background: linear-gradient(to right, #22c55e, #16a34a) !important;
        }
        
        .wrong {
            animation: wrongShake 0.4s ease;
            background: linear-gradient(to right, #ef4444, #b91c1c) !important;
        }
        
        @keyframes correctFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes wrongShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        
        /* === FADE BETWEEN QUESTIONS === */
        .fade {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* === RESULTS OVERLAY === */
        #resultScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .resultBox {
            background: #1f2937;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #374151;
            width: 90%;
            max-width: 400px;
        }
        
        .resultBox h2 {
            margin-bottom: 1rem;
        }
        
        .resultBox button {
            margin-top: 1rem;
        }
        #progressWrapper {
            margin-bottom: 1.5rem;
        }
        
        #progressText {
            text-align: right;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            opacity: 0.8;
        }
        
        #progressBar {
            width: 100%;
            height: 10px;
            background: #374151;
            border-radius: 999px;
            overflow: hidden;
        }
        
        #progressFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #2563eb, #22c55e);
            transition: width 0.3s ease;
        }
        .favicon-link {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .favicon-link img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }
        
        .favicon-link img:hover {
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<h1>Geometry Quiz</h1>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [
{q:"What is the area formula for a circle?", a:["πr²","2πr","πd","πr"], c:0},

{q:"What is the circumference formula of a circle?", a:["πr²","2πr","πd²","r²"], c:1},

{q:"What is the diameter if the radius is 6?", a:["6","12","18","36"], c:1},

{q:"Parallel lines do what?", a:["Intersect once","Never intersect","Form right angles","Curve"], c:1},

{q:"Perpendicular lines intersect at what angle?", a:["45°","90°","180°","360°"], c:1},

{q:"How many sides does a quadrilateral have?", a:["3","4","5","6"], c:1},

{q:"A square has how many equal sides?", a:["2","3","4","5"], c:2},

{q:"A rhombus has?", a:["4 equal sides","4 right angles","3 equal sides","2 equal sides"], c:0},

{q:"A trapezoid has?", a:["No parallel sides","1 pair of parallel sides","2 pairs of parallel sides","4 equal sides"], c:1},

{q:"A rectangle has?", a:["4 right angles","4 equal sides","No angles","3 angles"], c:0},

{q:"Congruent figures are?", a:["Same shape and size","Same shape only","Same size only","Different"], c:0},

{q:"Similar figures are?", a:["Same shape only","Same shape and proportional size","Exact copies","Different"], c:1},

{q:"A chord is?", a:["Line through center","Line touching circle","Segment connecting 2 points on circle","Radius"], c:2},

{q:"A tangent touches a circle at?", a:["1 point","2 points","Center","No points"], c:0},

{q:"Volume formula of a cube?", a:["s²","s³","6s²","4s"], c:1},

{q:"Surface area of a cube?", a:["s³","6s²","4s²","2s²"], c:1},

{q:"Volume of a rectangular prism?", a:["lw","lwh","2l+2w+2h","wh"], c:1},];

let i=0, score=0;
let userAnswers = [];
function load(){
    updateProgress();
 if(i>=questions.length){

 let review = `
 <h2>Score: ${score}/${questions.length}</h2>
 <h3>Review</h3>
 `;

 questions.forEach((q, index) => {

   const userChoice = userAnswers[index];
   const correctChoice = q.c;

   review += `
   <div style="margin-bottom:20px; text-align:left;">
     <strong>${index + 1}. ${q.q}</strong><br>
     Your Answer:
     <span style="color:${userChoice===correctChoice ? 'lime' : 'red'}">
       ${q.a[userChoice]}
     </span><br>
     Correct Answer:
     <span style="color:lime">
       ${q.a[correctChoice]}
     </span>
   </div>
   `;
 });

 document.getElementById("quiz").innerHTML = review;
 return;
}

 let q = questions[i];
 document.getElementById("quiz").innerHTML =
 `<h2>${q.q}</h2>` +
 q.a.map((ans,idx)=>
 `<button onclick="check(${idx})">${ans}</button>`).join("");
}

function check(idx){

 userAnswers.push(idx);

 if(idx===questions[i].c) score++;

 i++;
 load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
    function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
