<!DOCTYPE html>
<html lang=en>
<head>
<title>Trigonometry Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
<div class="container">
<h1>Trigonometry Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
const questions = [
  {q:"What is sin(90°)?", a:["0","1","-1"], c:1},
  {q:"What is cos(0°)?", a:["0","1","-1"], c:1},
  {q:"What is tan(45°)?", a:["0","1","√3"], c:1},
  {q:"What is sin(0°)?", a:["0","1","-1"], c:0},
  {q:"What is cos(90°)?", a:["0","1","-1"], c:0},

  {q:"What is tan(0°)?", a:["0","1","Undefined"], c:0},
  {q:"What is sin(30°)?", a:["1/2","√2/2","√3/2"], c:0},
  {q:"What is cos(60°)?", a:["1/2","√2/2","√3/2"], c:0},
  {q:"What is sin(45°)?", a:["1/2","√2/2","√3/2"], c:1},
  {q:"What is cos(45°)?", a:["1/2","√2/2","√3/2"], c:1},

  {q:"What is tan(30°)?", a:["√3/3","1","√3"], c:0},
  {q:"What is tan(60°)?", a:["√3/3","1","√3"], c:2},
  {q:"What is the reciprocal of sine?", a:["Secant","Cosecant","Cotangent"], c:1},
  {q:"What is the reciprocal of cosine?", a:["Secant","Cosecant","Cotangent"], c:0},
  {q:"What is the reciprocal of tangent?", a:["Secant","Cosecant","Cotangent"], c:2},

  {q:"SOH stands for?", a:["sin=opp/hyp","sin=adj/hyp","sin=hyp/opp"], c:0},
  {q:"CAH stands for?", a:["cos=opp/hyp","cos=adj/hyp","cos=hyp/adj"], c:1}

];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
