<!DOCTYPE html>
<html lang=en>
<head>
<title>Physics Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
<h1>Physics Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [
{q:"What type of wave is sound?", a:["Longitudinal","Transverse","Electromagnetic"], c:0},
  {q:"What type of wave is light?", a:["Electromagnetic","Mechanical","Longitudinal"], c:0},
  {q:"Unit of electric current?", a:["Ampere","Volt","Ohm"], c:0},
  {q:"Ohm’s Law is?", a:["V = IR","P = IV","F = qE"], c:0},
  {q:"Unit of resistance?", a:["Ohm","Tesla","Coulomb"], c:0},
  {q:"Current is?", a:["Flow of charge","Stored energy","Electric force"], c:0},
  {q:"Voltage is?", a:["Electric potential difference","Current flow","Resistance"], c:0},

  {q:"Unit of charge?", a:["Coulomb","Ampere","Volt"], c:0},
  {q:"Magnetic field unit?", a:["Tesla","Newton","Farad"], c:0},
  {q:"What particle has a negative charge?", a:["Electron","Proton","Neutron"], c:0},
  {q:"What particle has no charge?", a:["Neutron","Electron","Proton"], c:0},
  {q:"Speed of light?", a:["3×10⁸ m/s","3×10⁶ m/s","3×10¹⁰ m/s"], c:0},
  {q:"What does inertia depend on?", a:["Mass","Velocity","Force"], c:0},
  {q:"Unit of capacitance?", a:["Farad","Tesla","Volt"], c:0},
  {q:"What is displacement?", a:["Change in position","Total distance traveled","Rate of motion"], c:0},
  {q:"What graph slope gives velocity?", a:["Position-time graph","Velocity-time graph","Force-time graph"], c:0},
  {q:"What graph slope gives acceleration?", a:["Velocity-time graph","Position-time graph","Mass-time graph"], c:0}

];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
