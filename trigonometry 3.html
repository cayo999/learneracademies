<!DOCTYPE html>
<html lang=en>
<head>
<title>Trigonometry Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
<div class="container">
<h1>Trigonometry Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
const questions = [
  
  {q:"Degrees in π radians?", a:["90°","180°","360°"], c:1},
  {q:"Degrees in π/2 radians?", a:["45°","90°","180°"], c:1},

  {q:"sin(180°)?", a:["0","1","-1"], c:0},
  {q:"cos(180°)?", a:["0","1","-1"], c:2},
  {q:"tan(90°)?", a:["0","1","Undefined"], c:2},
  {q:"Quadrant I signs?", a:["All positive","Only sin","Only cos"], c:0},
  {q:"Quadrant II positive function?", a:["Sine","Cosine","Tangent"], c:0},

  {q:"Quadrant III positive function?", a:["Sine","Cosine","Tangent"], c:2},
  {q:"Quadrant IV positive function?", a:["Sine","Cosine","Tangent"], c:1},
  {q:"Unit circle radius?", a:["1","π","2"], c:0},
  {q:"Coordinates on unit circle?", a:["(cosθ,sinθ)","(sinθ,cosθ)","(tanθ,sinθ)"], c:0},
  {q:"sin(-θ) equals?", a:["sinθ","-sinθ","cosθ"], c:1},

  {q:"cos(-θ) equals?", a:["cosθ","-cosθ","sinθ"], c:0},
  {q:"tan(-θ) equals?", a:["tanθ","-tanθ","cotθ"], c:1},
  {q:"Amplitude of y=3sinx?", a:["1","2","3"], c:2},
  {q:"Vertical shift of y=sinx+4?", a:["4 up","4 down","none"], c:0},
  {q:"Phase shift of y=sin(x-2)?", a:["2 right","2 left","none"], c:0}
];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
