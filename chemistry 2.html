<!DOCTYPE html>
<html lang=en>
<head>
    <title>Chemistry Quiz | Learner Academies</title>
    <link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
    <style>
        /* === GLOBAL THEME === */
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(to bottom right, #111827, #0f172a, #111827);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        
        /* === MAIN CONTAINER === */
        .container {
            width: 100%;
            max-width: 700px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        
        /* === HEADINGS === */
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        /* === BUTTONS === */
        button {
            width: 100%;
            margin: 0.5rem 0;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            background: linear-gradient(to right, #2563eb, #22c55e);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(to right, #3b82f6, #4ade80);
        }
        
        /* === ANSWER ANIMATIONS === */
        .correct {
            animation: correctFlash 0.4s ease;
            background: linear-gradient(to right, #22c55e, #16a34a) !important;
        }
        
        .wrong {
            animation: wrongShake 0.4s ease;
            background: linear-gradient(to right, #ef4444, #b91c1c) !important;
        }
        
        @keyframes correctFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes wrongShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        
        /* === FADE ANIMATION === */
        .fade {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* === RESULTS SCREEN === */
        #resultScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .resultBox {
            background: #1f2937;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #374151;
            width: 90%;
            max-width: 400px;
        }
        /* === ANSWER ANIMATIONS === */
        .correct {
            animation: correctFlash 0.4s ease;
            background: linear-gradient(to right, #22c55e, #16a34a) !important;
        }
        
        .wrong {
            animation: wrongShake 0.4s ease;
            background: linear-gradient(to right, #ef4444, #b91c1c) !important;
        }
        
        @keyframes correctFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes wrongShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        
        /* === FADE BETWEEN QUESTIONS === */
        .fade {
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* === RESULTS OVERLAY === */
        #resultScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .resultBox {
            background: #1f2937;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid #374151;
            width: 90%;
            max-width: 400px;
        }
        
        .resultBox h2 {
            margin-bottom: 1rem;
        }
        
        .resultBox button {
            margin-top: 1rem;
        }
        #progressWrapper {
            margin-bottom: 1.5rem;
        }
        
        #progressText {
            text-align: right;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            opacity: 0.8;
        }
        
        #progressBar {
            width: 100%;
            height: 10px;
            background: #374151;
            border-radius: 999px;
            overflow: hidden;
        }
        
        #progressFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #2563eb, #22c55e);
            transition: width 0.3s ease;
        }
        .favicon-link {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .favicon-link img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }
        
        .favicon-link img:hover {
            transform: scale(1.15);
        }
    </style>
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
<h1>Chemistry Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [

  {q:"What is the formula for table salt?", a:["NaCl","KCl","NaOH"], c:0},
  {q:"What is the charge of a proton?", a:["+1","-1","0"], c:0},
  {q:"What is the charge of an electron?", a:["+1","-1","0"], c:1},

  {q:"What does pH measure?", a:["Temperature","Acidity","Pressure"], c:1},
  {q:"A pH below 7 is?", a:["Basic","Neutral","Acidic"], c:2},
  {q:"A pH above 7 is?", a:["Acidic","Basic","Neutral"], c:1},
  {q:"What is the chemical formula for carbon dioxide?", a:["CO","CO₂","C₂O"], c:1},
  {q:"What type of bond shares electrons?", a:["Ionic","Covalent","Metallic"], c:1},

  {q:"What type of bond transfers electrons?", a:["Ionic","Covalent","Hydrogen"], c:0},
  {q:"What is the periodic table organized by?", a:["Atomic number","Atomic mass","Alphabetical order"], c:0},
  {q:"Who created the periodic table?", a:["Bohr","Mendeleev","Dalton"], c:1},
  {q:"What is the symbol for oxygen?", a:["Ox","O","Og"], c:1},
  {q:"How many electrons can the first shell hold?", a:["2","8","18"], c:0},

  {q:"What is Avogadro’s number?", a:["6.02×10²³","3.14","9.8"], c:0},
  {q:"What is a mole?", a:["Amount of substance","Type of atom","Energy unit"], c:0},
  {q:"What happens in oxidation?", a:["Gain electrons","Lose electrons","No change"], c:1}
  
];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
