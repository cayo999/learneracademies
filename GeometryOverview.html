<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Quiz | Learner Academies</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
<a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
    <!-- Quiz Page -->
    <div id="quizPage" class="container">
        <div class="progress-section">
            <div class="progress-header">
                <span class="progress-text" id="progressText">Question 1 of 8</span>
                <span class="progress-percent" id="progressPercent">13% Complete</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="question-section">
            <h2 class="question-title" id="questionTitle"></h2>
            <div class="options" id="optionsContainer"></div>
        </div>

        <div class="navigation">
            <button class="btn btn-secondary" id="previousBtn">Previous</button>
            <button class="btn btn-primary" id="nextBtn" disabled>Next</button>
        </div>
    </div>

    <!-- Results Page -->
    <div id="resultsPage" class="container hidden">
        <div class="results-container">
            <div class="results-icon">✓</div>

            <h1 class="results-title">Quiz Complete!</h1>

            <p class="results-score">
                You scored
                <span class="results-score-highlight" id="finalScore">0</span>
                out of
                <span class="results-score-total" id="totalQuestions">49</span>
            </p>

            <div class="results-percentage" id="finalPercentage">0%</div>

            <div class="results-list" id="resultsList"></div>

            <button class="btn-restart" id="restartBtn">
                Restart Quiz
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
