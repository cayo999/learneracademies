<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Algebra Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<h1>Algebra Quiz</h1>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [

  {q:"What is 10% of 50?", a:["5","10","15"], c:0},
  {q:"What is 25% as a decimal?", a:["0.25","2.5","25"], c:0},

  {q:"Convert 0.75 to percent", a:["7.5%","75%","750%"], c:1},
  {q:"Solve: 2x-4=10", a:["7","6","8"], c:0},
  {q:"Which is equivalent to x(x+7)?", a:["x²+7x","x²+7","7x²"], c:0},
  {q:"What is the inverse of addition?", a:["Subtraction","Multiplication","Division"], c:0},
  {q:"What is the inverse of multiplication?", a:["Division","Subtraction","Addition"], c:0},

  {q:"Simplify: √49", a:["6","7","8"], c:1},
  {q:"What is a solution to y=2x+1 when x=3?", a:["5","6","7"], c:2},
  {q:"What is the midpoint of (2,4) and (6,8)?", a:["(4,6)","(8,12)","(2,2)"], c:0},
  {q:"What is 4²-3²?", a:["7","16","9"], c:0},
  {q:"Simplify: 2(x-3)+4", a:["2x-2","2x+1","2x-6"], c:0},

  {q:"Solve: x+9<15", a:["x<6","x>6","x=6"], c:0},
  {q:"What symbol means 'greater than or equal to'?", a:[">=","<=","≠"], c:0},
  {q:"What is the domain of a function?", a:["Input values","Output values","Slope"], c:0},
  {q:"What is the range of a function?", a:["Output values","Input values","Equation"], c:0},
  {q:"What is 6(2x+1)?", a:["12x+6","12x+1","8x+6"], c:0}
];

let i=0, score=0;
let userAnswers = [];
function load(){
    updateProgress();
 if(i>=questions.length){

 let review = `
 <h2>Score: ${score}/${questions.length}</h2>
 <h3>Review</h3>
 `;

 questions.forEach((q, index) => {

   const userChoice = userAnswers[index];
   const correctChoice = q.c;

   review += `
   <div style="margin-bottom:20px; text-align:left;">
     <strong>${index + 1}. ${q.q}</strong><br>
     Your Answer:
     <span style="color:${userChoice===correctChoice ? 'lime' : 'red'}">
       ${q.a[userChoice]}
     </span><br>
     Correct Answer:
     <span style="color:lime">
       ${q.a[correctChoice]}
     </span>
   </div>
   `;
 });

 document.getElementById("quiz").innerHTML = review;
 return;
}

 let q = questions[i];
 document.getElementById("quiz").innerHTML =
 `<h2>${q.q}</h2>` +
 q.a.map((ans,idx)=>
 `<button onclick="check(${idx})">${ans}</button>`).join("");
}

function check(idx){

 userAnswers.push(idx);

 if(idx===questions[i].c) score++;

 i++;
 load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
    function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
