<!DOCTYPE html>
<html lang=en>
<head>
<title>Physics Quiz | Learner Academies</title>
<link rel="stylesheet" href="QuizStyles.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
    <a href="index.html" class="favicon-link">
    <img src="favicon.png" alt="Launcher" />
</a>
<div class="container">
<h1>Physics Quiz</h1>
    <div id="progressWrapper">
    <div id="progressText">0%</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>
<div id="quiz"></div>
</div>

<script>
    let streak = 0;
const questions = [
{q:"Unit of Force?", a:["Watt","Newton","Joule"], c:1},
  {q:"What is the SI unit of energy?", a:["Joule","Newton","Pascal"], c:0},
  {q:"What is velocity?", a:["Speed with direction","Distance traveled","Force over area"], c:0},
  {q:"Acceleration is defined as?", a:["Rate of change of velocity","Distance over time","Mass times velocity"], c:0},
  {q:"What does Newton’s First Law describe?", a:["Inertia","Gravity","Energy conservation"], c:0},
  {q:"Formula for force?", a:["F = ma","F = mv","F = d/t"], c:0},
  {q:"What is the unit of power?", a:["Joule","Watt","Volt"], c:1},
  {q:"What is momentum?", a:["Mass × velocity","Force × time","Energy ÷ time"], c:0},
  {q:"Unit of momentum?", a:["kg·m/s","N/m","J/s"], c:0},
  {q:"What law states action-reaction pairs?", a:["Newton’s Third Law","Newton’s Second Law","Law of Gravitation"], c:0},

  {q:"Formula for kinetic energy?", a:["KE = 1/2mv²","KE = mgh","KE = Fd"], c:0},
  {q:"Formula for gravitational potential energy?", a:["mgh","1/2mv²","Fd"], c:0},
  {q:"What is work?", a:["Force × distance","Mass × acceleration","Power × time"], c:0},
  {q:"Unit of work?", a:["Newton","Joule","Pascal"], c:1},
  {q:"Power is defined as?", a:["Work/time","Force × time","Mass × velocity"], c:0},
  {q:"What is the acceleration due to gravity on Earth?", a:["9.8 m/s²","8.9 m/s²","10.8 m/s²"], c:0}
  
];

let i=0,score=0;
let userAnswers = [];
function load(){
    updateProgress();
if(i>=questions.length){

let review = `
<h2>Score: ${score}/${questions.length}</h2>
<h3>Question Review</h3>
`;

questions.forEach((q, index) => {

    const userChoice = userAnswers[index];
    const correctChoice = q.c;

    review += `
    <div style="margin-bottom:20px; text-align:left;">
        <strong>${index + 1}. ${q.q}</strong><br>
        Your Answer:
        <span style="color:${userChoice === correctChoice ? 'lime' : 'red'}">
            ${q.a[userChoice]}
        </span><br>
        Correct Answer:
        <span style="color:lime">
            ${q.a[correctChoice]}
        </span>
    </div>
    `;
});

quiz.innerHTML = review;
return;
}
let q=questions[i];
quiz.innerHTML="<h2>"+q.q+"</h2>"+
q.a.map((x,j)=>`<button onclick="check(${j})">${x}</button>`).join("");
}

function check(j){

userAnswers.push(j);

if(j===questions[i].c) score++;

i++;
load();
}
function updateProgress() {
    let percent = Math.round((i / questions.length) * 100);

    document.getElementById("progressFill").style.width = percent + "%";
    document.getElementById("progressText").innerText = percent + "%";
}
function playSound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === "correct") {
        osc.frequency.value = 750;
        gain.gain.value = 0.1;
    } else {
        osc.frequency.value = 180;
        gain.gain.value = 0.1;
    }

    osc.type = "sine";
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}
load();
</script>
</body>
</html>
